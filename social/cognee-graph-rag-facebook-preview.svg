<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Cognee：讓 AI 智能體真正記得專案脈絡</title>
  <desc id="desc">知識圖譜節點連結文件、Cognee、Graph RAG 與跨會話長期記憶。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10172f"/>
      <stop offset="0.58" stop-color="#302c7f"/>
      <stop offset="1" stop-color="#086f87"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity=".32"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a5f3fc"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <circle cx="1060" cy="82" r="280" fill="url(#glow)"/>
  <circle cx="115" cy="600" r="260" fill="url(#glow)" opacity=".55"/>

  <g opacity=".16" stroke="#dbeafe" fill="none">
    <path d="M55 84H1145M55 546H1145"/>
    <path d="M95 52V578M1105 52V578"/>
  </g>

  <g font-family="'Noto Sans TC','Microsoft JhengHei','PingFang TC','Segoe UI',sans-serif">
    <rect x="74" y="56" width="606" height="42" rx="21" fill="#ffffff" fill-opacity=".1" stroke="#ffffff" stroke-opacity=".28"/>
    <text x="98" y="84" fill="#cffafe" font-size="18" font-weight="700" letter-spacing="1.6">AI AGENT MEMORY × KNOWLEDGE GRAPH × GRAPH RAG</text>

    <text x="72" y="174" fill="#ffffff" font-size="63" font-weight="800">讓 AI 智能體</text>
    <text x="72" y="250" fill="#ffffff" font-size="63" font-weight="800">真正記得專案脈絡</text>
    <text x="76" y="298" fill="#dbeafe" font-size="24" font-weight="500">Cognee 技術指南：從語意關係到跨會話持久記憶</text>

    <g filter="url(#shadow)">
      <rect x="74" y="362" width="210" height="114" rx="22" fill="#ffffff" fill-opacity=".1" stroke="#bfdbfe" stroke-opacity=".45"/>
      <rect x="370" y="347" width="212" height="144" rx="26" fill="#ffffff" fill-opacity=".16" stroke="#67e8f9" stroke-width="2"/>
      <rect x="668" y="362" width="210" height="114" rx="22" fill="#ffffff" fill-opacity=".1" stroke="#bfdbfe" stroke-opacity=".45"/>
      <rect x="964" y="362" width="162" height="114" rx="22" fill="#ffffff" fill-opacity=".1" stroke="#bfdbfe" stroke-opacity=".45"/>
    </g>

    <g stroke="#a5f3fc" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M284 419H354"/>
      <path d="M582 419H652"/>
      <path d="M878 419H948"/>
    </g>

    <g text-anchor="middle">
      <text x="179" y="407" fill="#ffffff" font-size="26" font-weight="750">文件與對話</text>
      <text x="179" y="442" fill="#bae6fd" font-size="17">Documents &amp; Context</text>

      <circle cx="476" cy="386" r="17" fill="#22d3ee"/>
      <circle cx="461" cy="402" r="8" fill="#a5f3fc"/>
      <circle cx="493" cy="405" r="10" fill="#67e8f9"/>
      <path d="M461 402L476 386L493 405" stroke="#ecfeff" stroke-width="3" fill="none"/>
      <text x="476" y="448" fill="#ffffff" font-size="34" font-weight="800">Cognee</text>
      <text x="476" y="475" fill="#cffafe" font-size="16">Memory Control Layer</text>

      <text x="773" y="407" fill="#ffffff" font-size="26" font-weight="750">知識圖譜</text>
      <text x="773" y="442" fill="#bae6fd" font-size="17">Graph RAG</text>

      <text x="1045" y="407" fill="#ffffff" font-size="24" font-weight="750">長期記憶</text>
      <text x="1045" y="442" fill="#bae6fd" font-size="16">Persistent</text>
    </g>

    <text x="76" y="555" fill="#e0f2fe" font-size="21" font-weight="600">定義・架構・功能・使用場景・Python 實作・Claude Code 整合</text>
    <text x="1126" y="555" fill="#a5f3fc" font-size="18" text-anchor="end">完整技術文章</text>
  </g>
</svg>
