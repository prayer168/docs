  <textarea id="plain-source" class="visually-hidden" aria-hidden="true" tabindex="-1">從點擊操作走向科學探究：自然數位互動教材在教學上的應用

當模擬與實測出現不同答案

自然課裡，教師先讓學生觀察吸管插入水中看似彎折的現象，再開啟「光的折射」互動模擬。學生拖曳光源，畫面立即顯示入射角、折射角與清楚的光線路徑。有一組很快提出：「入射角增加一倍，折射角也會增加一倍。」然而，當學生改用光線盒、量角器和透明水槽實際測量時，各組數值並不完全相同，光線邊緣也不像模擬畫面那麼銳利。

教師沒有立刻公布答案，而是問：「畫面呈現的是實際證據，還是根據模型產生的結果？」模擬與實測之間的落差，讓原本的操作活動轉化為可探究的問題：光由空氣進入水中時，入射角與折射角究竟有什麼關係？

互動教材是可操作的模型

數位互動教材可以把太快、太慢、太小、難以接近或具有危險性的現象視覺化。例如光線行進、粒子運動、月相變化或化學反應的微觀過程，都能透過動畫、圖表和動態標示協助觀察。學生也能固定其他條件，只改變一項變因，反覆測試並立即看見結果。

這些功能能降低觀察門檻，卻不會自動產生科學探究。如果學生只是依指示拖曳滑桿、追求答對或完成關卡，仍可能沒有提出問題、保存數據或解釋證據。臺灣自然科學領綱將探究歷程整理為發現問題、規劃與研究、論證與建模、表達與分享，並強調觀察、測量、資料分析與形成結論。因此，教材的互動設計必須服務於問題與證據，而不是讓點擊次數取代思考。

從折射模擬建立證據鏈

學生先根據生活經驗畫出預測，說明光由空氣進入水中後可能如何偏折。接著，他們在模擬中固定介質與光的顏色，只改變入射角，記錄多組入射角與折射角。國小高年級可以比較偏折方向和角度變化；國中學生則可進一步檢查兩個角度是否為簡單倍數，或使用正弦值比較資料與折射模型。

完成模擬後，各組以相同條件進行真實測量，每個角度至少重複數次，保留原始數據，不挑選最接近模擬值的一筆。學生將模擬資料、各次實測值與測量範圍並列，找出一致與不一致之處。教師可以追問：「如果只改變一個條件，結果會有什麼不同？」以及「模擬結果和實驗結果不一致時，可能是哪個環節造成的？」

學生可能發現，光束寬度、量角器中心位置、視差、水面晃動、容器形狀和角度判讀方式都會影響測量。模擬顯示的是在設定條件下由模型計算出的理想結果；實驗數據則包含器材限制與測量不確定性。經過比較，學生可將「兩個角度固定成倍增加」修正為較審慎的說法：在相同介質下，入射角增大時折射角也會改變，但兩者不一定是簡單的線性倍數關係。

若資料仍然分散，「目前證據不足」也是合理結論。下一步可以增加重複次數、改進光束品質、統一讀值方法，或改用不同介質再次測試。研究顯示，真實與虛擬實驗各有不同學習功能，兩者搭配通常有助於概念理解，但沒有單一固定的最佳先後順序。PhET官方也指出，模擬有助於概念學習，卻不能涵蓋真實器材操作等所有實驗目標。

進行光學活動時，應優先使用適合課堂的低功率光源或光線盒，並由教師檢查器材。不得將雷射或強光照向眼睛、同學或高反射表面。

讓AI提出候選解釋，而不是代替判斷

在資料整理階段，AI可以協助將不含姓名、照片或其他個人資料的測量紀錄轉成圖表，提醒單位缺漏、標示可能的異常值，並提出模擬與實測不同的候選原因。它也能建議下一個可測試的問題，例如「容器形狀是否影響角度判讀？」但這些輸出只能視為待驗證的假設。

AI可能把兩個同時增加的變數誤說成比例關係，也可能未檢查單位就產生看似合理的圖表。AI幻覺就是把不確定的推測說得像確定知識。教育部《中小學使用生成式人工智慧注意事項2.1》提醒，生成內容可能帶有錯誤、偏見或不完整觀點，使用者必須查證並避免輸入個人資料。UNESCO的學生AI能力框架也強調批判判斷、倫理責任與以人為本。

人機分工應清楚：AI協助整理資料、繪圖、發現可能趨勢和提出候選問題；學生負責現場觀察、正確測量、檢查原始紀錄、查核來源、判斷解釋是否合理，以及指出限制。教師還可追問：「AI的說法使用了哪些證據？」與「目前的證據足以支持結論嗎？還有其他解釋嗎？」

從科學問題選擇數位工具

設計自然數位教材時，教師應先確定學生要研究的科學問題，再選擇模擬、感測器、動畫或AI。每一次互動都應對應一項學習任務，例如預測、控制變因、記錄、比較或解釋。系統性回顧顯示，模擬探究需要適當的提示、鷹架與後設認知支持；完全放任學生操作，不一定能建立正確概念。

實際備課時，教師可把活動安排為「預測、操作、查證、解釋」四個階段。操作前，學生先寫下預期變化與理由；操作中，每改變一次條件就記錄數值與畫面特徵；操作後，再以真實實驗、課本或可信資料核對。若結果不符預期，不以系統公布答案結束，而是要求學生標示衝突證據、提出替代解釋並決定需要補測的項目。

小組合作時，可分配操作員、紀錄員、檢核員與報告員並輪替角色，避免少數學生控制裝置、其他人只看畫面。若設備不足，可採全班投影預測、小組共用操作與紙本紀錄；若學生有視覺、聽覺或動作需求，則提供鍵盤操作、文字替代、足夠對比和延長作答時間。這些安排讓數位教材的可用性真正轉化為參與機會。

課程也應保留真實實驗、戶外觀察和同儕討論，讓學生接觸器材限制、自然變異與不同證據。評量重點可放在學生是否提出可測試的問題、保存原始資料、用證據支持主張並說明限制，而不只計算答題正確率或操作次數。同時，教師須準備共用裝置、離線或紙本替代方案，檢查字級、色彩對比、鍵盤操作和語音支援，並落實個人資料保護。

好的自然數位互動教材，不是替學生更快給出答案，而是讓模型變得可以操作、比較與質疑。AI提供可能性，互動教材提供測試環境，學生則以觀察、實驗、資料與推理形成暫時性的科學結論。當學生開始追問「這個結果有什麼證據」，點擊才真正走向探究。
